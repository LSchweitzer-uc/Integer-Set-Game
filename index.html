<!DOCTYPE html>
<html>
<head>
  <title>Integer Set</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Integer Set</h1>

  <p>Select sets of 3+ integers that add up to 0 to score points</p>

  <div class="controls">
  <button onclick="startGame()">Start Game</button>
  <button onclick="stopGame()">Stop Game</button>

  <div class="difficulty">
    <label for="diffInput">Difficulty:</label>
    <input id="diffInput" type="number" value="25" min="1" max="5000000">
  </div>
  </div>
  
  <div class="stats">
    <p>Time Remaining: <span id="time">120</span>s</p>
    <p>Score: <span id="score">0</span></p>
    <p>Timed High Score: <span id="highScore">0</span></p>
  </div>
  
  <p id="setStatus"></p>
  
  <div id="numbers"></div>
  
  <div class="actions">
    <button id="submitBtn">Submit Set</button>
    <button onclick="handleDrawCard()">Draw Card</button>
  </div>
  
  <p id="result"></p>


  <script src="script.js"></script>
</body>
</html>
