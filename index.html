<!DOCTYPE html>
<html>
<head>
  <title>Integer Set</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Integer Set</h1>

  <p>Select sets of 3+ integers that add up to 0 to score points</p>

  <p>Time Left: <span id="time">120</span>s</p>
  
  <p>High Score: <span id="highScore">0</span></p>
  
  <p>Score: <span id="score">0</span></p>
  
  <label for="diffInput">Set Difficulty (Std Dev): </label>
  
  <input id="diffInput" type="number" value="25" min="1" max="5000000">
  
  <p>Current Difficulty: <span id="diffDisplay"></span></p>
  
  <p id="setStatus"></p>

  <div id="numbers"></div>

  <button onclick="startGame()">Start Timed Game</button>
  
  <button id="stopBtn">Stop Game</button>
  
  <button id="submitBtn">Submit Set</button>
  
  <button onclick="handleDrawCard()">Draw Card</button>
  
  <p id="result"></p>


  <script src="script.js"></script>
</body>
</html>
